<!DOCTYPE html>
<html lang="en">
<head>
<title>Yakionigiri Yasan</title>
<meta charset ="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}
body{
	font-family: Arial, Helvetica, sans-serif;
	margin:0;
}

.header{
	padding: 80px;
	text-align: center;
	background: #1abc9c;
	color: white;
}
.navbar{
	overflow: hidden;
	background-color: #333;
}
.navbar a{
	float: right;
	display: block;
	color: white;
	text-align: center;
	padding: 14px 20px;
	text-decoration: none;
}
.navbar a:hover{
	background-color: #ddd;
	color: black;
}
.menu{
	max-width: 500px;
	margin: 30px auto;
	padding: 0 20px;
	text-align: left;
}

.menu h2{
	text-align: center;
}

</style>
</head>
<body>
<div class="header">
	<h1> Yakionigiri Store </h1>
	<p> I sell yakionigiri </p>
</div>

<div class="navbar">
	<a href= "index.html">Home</a>
	<a href= "#">Menu</a>
	<a href= "order.html">Order</a>
	<a href= "#">Contact</a>
</div>

<div class="menu">
	<h2>Menu</h2>
	<p>Yakionigiri 1-4 pcs ......Rp.15000 </p>
	<p>Yakionigiri 5-9 pcs ......Rp.13000  (save Rp 10.000!)</p>
	<p>Yakionigiri 10 + pcs ......Rp.11.000 (save Rp 40.000!)</p>
	<b>Quantity:  </b>
	<Input id="quantity" type="number" min="1" oninput="quantityChanged()"></Input><br>
	<b>Total Price:  </b><i id=totalPrice>Rp 0</i><br>
	<b id=discountText></b><br>
	<button class="buyButton" onclick="BuyButtonPressed()">Buy In WhatsApp</button> <br>
</div>

<h3 id="errorMsg"></h3>


<script>
var errorText = document.getElementById("errorMsg");
var totalPriceText = document.getElementById("totalPrice");
var discountText = document.getElementById("discountText");

function quantityChanged(){
	totalPriceText.innerHTML = "Rp " + GetNewPrice().toLocaleString("id-ID");
	UpdateNewDiscountPrice();
}

function GetNewPrice()
{
	var number = document.getElementById("quantity").value;
	var newPrice;
	if (number<=4) newPrice = number * 15000
	else if(number <=9) newPrice = number * 13000
	else newPrice = number * 11000 
	return newPrice;
}

function UpdateNewDiscountPrice()
{
	var number = document.getElementById("quantity").value;
	var discount = number * 15000 - GetNewPrice();
	if(discount != 0) discountText.innerHTML = " discount - Rp" + discount.toLocaleString("id-ID") + "!";

}

function BuyButtonPressed()
{
	var number = document.getElementById("quantity").value;
	if(number <1)
	{
		errorText.innerHTML = "Make sure you set your quantity at least 1";
		return;
	}
	errorText.innerHTML = "";
   	var msg = "Halo! Saya mau pesan Yakionigiri sebanyak " + number + " pcs. Total: Rp " + GetNewPrice().toLocaleString("id-ID");
	window.open("https://wa.me/6281323882865?text=" + encodeURIComponent(msg), "_blank");
}
</script>
</body>
</html>
